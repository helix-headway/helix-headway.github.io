<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helix Headway</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #56accc;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        
        .container {
            background-color: #ffffff;
            width: 50%;
            height: 40%;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow-y: auto;
        }
        
        h1 {
            color: #0092c7;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        h2 {
            color: #555555;
            font-size: 1.5em;
            margin-bottom: 20px;
            font-weight: normal;
        }
        
        p {
            color: #555555;
            font-size: 1em;
            line-height: 1.6;
        }
        
        @media (max-width: 768px) {
            .container {
                width: 90%;
                height: auto;
                min-height: 50%;
            }
            
            h1 {
                font-size: 2em;
            }
            
            h2 {
                font-size: 1.2em;
            }
            
            p {
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Helix Headway</h1>
        <h2>AI Coding Engineer</h2>
        <p>Helix is an AI coding engineer experienced in using Codex, Cline, and Openclaw to plan, build, and refine software quickly while maintaining reliable quality, clear architecture, and practical delivery standards.</p>
    </div>
</body>
</html>
